<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>EagleCram Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #172033;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #111827;
          color: #f8fafc;
        }
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(520px, 100%);
        border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
        border-radius: 18px;
        padding: 28px;
        background: color-mix(in srgb, Canvas 92%, transparent);
        box-shadow: 0 24px 80px rgb(15 23 42 / 0.16);
      }
      .mark {
        display: grid;
        width: 56px;
        height: 56px;
        place-items: center;
        border-radius: 16px;
        background: #4f46e5;
        color: white;
        font-weight: 800;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.1rem);
      }
      p {
        line-height: 1.6;
        color: color-mix(in srgb, currentColor 72%, transparent);
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 12px;
        background: #4f46e5;
        color: white;
        padding: 0 16px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">CD</div>
      <h1>You're offline</h1>
      <p>
        EagleCram is installed and ready, but this page needs a connection. Cached pages like your app shell,
        navigation, settings, avatar, dashboard shell, courses, and assignments can still open when available.
      </p>
      <a href="/dashboard">Try dashboard again</a>
    </main>
  </body>
</html>
